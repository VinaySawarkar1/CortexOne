services:
  app:
    build: .
    ports:
      - "10000:10000"
    environment:
      - HOST=0.0.0.0
      - PORT=10000
      - NODE_ENV=production
      # set these in a .env file or replace with your values
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - USE_MONGODB=false
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

